name: build-push-deploy

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Login to Huawei SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.SWR_REGISTRY }}/xdeng/backend:${{ steps.vars.outputs.tag }} ./backend
          docker push ${{ secrets.SWR_REGISTRY }}/xdeng/backend:${{ steps.vars.outputs.tag }}

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Deploy to K8s and wait rollout
        run: |
          kubectl set image deployment/backend backend=${{ secrets.SWR_REGISTRY }}/xdeng/backend:${{ steps.vars.outputs.tag }}
          kubectl rollout status deployment/backend
