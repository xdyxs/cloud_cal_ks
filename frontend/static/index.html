<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云计算课程设计</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 { color: #1a73e8; }
        .info {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 4px;
            background: #1a73e8;
            color: white;
            cursor: pointer;
        }
        button:hover { background: #1557b0; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 4px;
            min-height: 40px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>云计算技术课程设计</h1>
    <div class="info">
        <p><strong>组长：</strong>2023112491 李青松</p>
        <p><strong>组员：</strong>2023112477 熊灯</p>
        <p><strong>班级：</strong>计算机三班</p>
    </div>

    <h2>接口测试</h2>
    <button onclick="testPing()">测试 /api/ping</button>
    <button onclick="testCounter()">测试 /api/counter</button>
    <button onclick="testData()">测试 /api/data</button>
    <div id="result">点击按钮测试后端接口...</div>

    <script>
        async function callApi(path) {
            const res = document.getElementById('result');
            res.textContent = '请求中...';
            try {
                const r = await fetch(path);
                const data = await r.json();
                res.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                res.textContent = '错误：' + e.message;
            }
        }
        function testPing() { callApi('/api/ping'); }
        function testCounter() { callApi('/api/counter'); }
        function testData() { callApi('/api/data'); }
    </script>
</body>
</html>
